    <polygon points="110,120 455,20 620,105 270,215" fill="#fff4e1" stroke="#f3bd59" stroke-width="3" opacity="0.68"/>
    <polygon points="260,98 445,48 530,92 344,148" fill="#ff8a65" opacity="0.38" stroke="#e95f3d"/>
    <circle cx="130" cy="113" r="14" fill="#0e8bd1"/>
