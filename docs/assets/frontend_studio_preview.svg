    <text x="87" y="92" font-family="Inter, Arial" font-size="16" fill="#0f3b73" font-weight="700">IN</text>
    <text x="605" y="84" font-family="Inter, Arial" font-size="16" fill="#0f735d" font-weight="700">OUT</text>
    <text x="322" y="88" font-family="Inter, Arial" font-size="16" fill="#b33b22" font-weight="800">AI accelerator hotspot</text>
    <path d="M150 118 C240 65, 330 80, 420 80 S545 95, 584 105" fill="none" stroke="#0e8bd1" stroke-width="5" opacity="0.75"/>
    <path d="M150 145 C250 100, 350 115, 430 118 S545 126, 584 135" fill="none" stroke="#2db7f5" stroke-width="4" opacity="0.65"/>
    <path d="M150 172 C250 142, 350 150, 430 156 S545 160, 584 166" fill="none" stroke="#65d6ff" stroke-width="4" opacity="0.65"/>
  </g>

  <rect x="850" y="348" width="490" height="390" rx="24" fill="#fbfdff" stroke="#dfeaf8"/>
  <text x="880" y="390" font-family="Inter, Arial" font-size="24" fill="#12263f" font-weight="800">Optimization + Rules</text>
  <g font-family="Inter, Arial">
    <rect x="882" y="420" width="424" height="42" rx="12" fill="#eef7ff"/>
    <text x="902" y="448" font-size="16" fill="#163b63" font-weight="700">Best candidate: width 1.2 mm · depth 2.5 mm · flow 8 L/min</text>
    <rect x="882" y="482" width="200" height="88" rx="16" fill="#ffffff" stroke="#e5effa"/>
    <text x="902" y="514" font-size="15" fill="#63738a" font-weight="700">Architecture</text>
    <text x="902" y="548" font-size="22" fill="#12263f" font-weight="800">Hybrid</text>
    <rect x="1106" y="482" width="200" height="88" rx="16" fill="#ffffff" stroke="#e5effa"/>
    <text x="1126" y="514" font-size="15" fill="#63738a" font-weight="700">Feasible cases</text>
    <text x="1126" y="548" font-size="22" fill="#12263f" font-weight="800">37 / 125</text>
    <rect x="882" y="596" width="424" height="94" rx="16" fill="#fffaf0" stroke="#f2d9a8"/>
    <text x="904" y="628" font-size="17" fill="#805800" font-weight="800">1500W design rule</text>
    <text x="904" y="660" font-size="15" fill="#5c4a21">Prefer manifold microchannels + embedded cooling + local pin fins.</text>
