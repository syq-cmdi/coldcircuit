<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f3b73"/>
      <stop offset="0.55" stop-color="#0e8bd1"/>
      <stop offset="1" stop-color="#6ee7ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6faff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1a4d83" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect x="30" y="28" width="1340" height="764" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="60" y="58" width="1280" height="135" rx="24" fill="url(#hero)"/>
  <text x="92" y="112" fill="#ffffff" font-family="Inter, Arial" font-size="46" font-weight="800">❄ ColdCircuit Studio</text>
  <text x="94" y="155" fill="#e9f8ff" font-family="Inter, Arial" font-size="20">Interactive 3D liquid cold plate design · 1500W TDP screening · embedded cooling rules · optimization candidates</text>

  <g font-family="Inter, Arial">
    <rect x="60" y="220" width="230" height="92" rx="18" fill="#ffffff" stroke="#e6effb" filter="url(#shadow)"/>
    <text x="84" y="254" font-size="14" fill="#63738a" font-weight="700">TDP</text>
    <text x="84" y="292" font-size="34" fill="#12263f" font-weight="800">1500 W</text>
    <rect x="310" y="220" width="230" height="92" rx="18" fill="#ffffff" stroke="#e6effb" filter="url(#shadow)"/>
    <text x="334" y="254" font-size="14" fill="#63738a" font-weight="700">MAX TEMP</text>
    <text x="334" y="292" font-size="34" fill="#12263f" font-weight="800">63.8 °C</text>
    <rect x="560" y="220" width="230" height="92" rx="18" fill="#ffffff" stroke="#e6effb" filter="url(#shadow)"/>
    <text x="584" y="254" font-size="14" fill="#63738a" font-weight="700">PRESSURE DROP</text>
    <text x="584" y="292" font-size="34" fill="#12263f" font-weight="800">0.42 bar</text>
    <rect x="810" y="220" width="230" height="92" rx="18" fill="#ffffff" stroke="#e6effb" filter="url(#shadow)"/>
    <text x="834" y="254" font-size="14" fill="#63738a" font-weight="700">COOLANT ΔT</text>
    <text x="834" y="292" font-size="34" fill="#12263f" font-weight="800">2.7 K</text>
    <rect x="1060" y="220" width="280" height="92" rx="18" fill="#ffffff" stroke="#e6effb" filter="url(#shadow)"/>
    <text x="1084" y="254" font-size="14" fill="#63738a" font-weight="700">FLOW REGIME</text>
    <text x="1084" y="292" font-size="34" fill="#12263f" font-weight="800">turbulent</text>
  </g>

  <rect x="60" y="348" width="760" height="390" rx="24" fill="#fbfdff" stroke="#dfeaf8"/>
  <text x="90" y="390" font-family="Inter, Arial" font-size="24" fill="#12263f" font-weight="800">Interactive 3D Structure</text>
  <g transform="translate(125 430)">
    <polygon points="110,210 455,110 620,195 270,305" fill="#d9efff" stroke="#76b7e7" stroke-width="3" opacity="0.75"/>
